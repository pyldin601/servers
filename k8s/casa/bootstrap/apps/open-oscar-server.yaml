---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: open-oscar-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
      - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/pyldin601/servers.git'
    path: k8s/casa/apps/open-oscar-server
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: open-oscar-server
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
