---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homefs-hub-telegram-bot
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      deployment: homefs-hub-telegram-bot
  template:
    metadata:
      labels:
        deployment: homefs-hub-telegram-bot
    spec:
      containers:
        - name: homefs-hub-telegram-bot
          image: ghcr.io/pyldin601/homefs-telegram-bot:254affb7f0644c18ae402c2e70329e0d36ead806
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama.default.svc.cluster.local:11434
            - name: OLLAMA_MODEL
              value: qwen2.5
            - name: ALLOWED_CHAT_IDS
              value: "384980395"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homefs-hub-telegram-bot-secret
                  key: TELEGRAM_BOT_TOKEN
            - name: TOLOKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: homefs-hub-telegram-bot-secret
                  key: TOLOKA_USERNAME
            - name: TOLOKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homefs-hub-telegram-bot-secret
                  key: TOLOKA_PASSWORD
            - name: SKILL_SERVER_URL
              value: http://homefs-skill-server.default.svc.cluster.local:8000
